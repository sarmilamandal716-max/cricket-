 <!DOCTYPE html>
<html lang="en">
<head>
 <meta name="monetag" content="a4f0355466f2e3ccf4890890150987e8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Fun Ultra</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #000);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 15px;
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
}

/* AD */
.ad {
    margin: 10px;
    padding: 15px;
    text-align: center;
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
}

/* CARD */
.card {
    margin: 15px;
    padding: 15px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,255,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* TEAM ROW */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.team {
    display: flex;
    align-items: center;
    gap: 10px;
}

.team img {
    width: 45px;
    height: 45px;
}

.vs {
    font-weight: bold;
    color: #00eaff;
}

.status {
    text-align: center;
    margin-top: 10px;
    color: #00ffcc;
}

/* BUTTON */
button {
    display: block;
    margin: 15px auto;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(90deg,#ff512f,#dd2476);
    color: white;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>🏏 Cricket Fun Ultra</header>

<div class="ad">🔥 AD SPACE (Google AdSense)</div>

<button onclick="loadMatches()">🔄 Refresh Matches</button>

<div id="matches"></div>

<div class="ad">📢 Your Ad Here = Money 💸</div>

<script>
const API_KEY = "bb086da0-3cab-4349-8c0e-7442c75c0b6a";

/* IPL TEAM LOGOS */
const logos = {
    "Chennai Super Kings": "https://1000logos.net/wp-content/uploads/2021/04/Chennai-Super-Kings-logo.png",
    "Mumbai Indians": "https://1000logos.net/wp-content/uploads/2021/04/Mumbai-Indians-logo.png",
    "Royal Challengers Bangalore": "https://1000logos.net/wp-content/uploads/2021/04/Royal-Challengers-Bangalore-logo.png",
    "Kolkata Knight Riders": "https://1000logos.net/wp-content/uploads/2021/04/Kolkata-Knight-Riders-logo.png",
    "Delhi Capitals": "https://1000logos.net/wp-content/uploads/2021/04/Delhi-Capitals-logo.png",
    "Sunrisers Hyderabad": "https://1000logos.net/wp-content/uploads/2021/04/Sunrisers-Hyderabad-logo.png",
    "Rajasthan Royals": "https://1000logos.net/wp-content/uploads/2021/04/Rajasthan-Royals-logo.png",
    "Punjab Kings": "https://1000logos.net/wp-content/uploads/2021/04/Punjab-Kings-logo.png",
    "Gujarat Titans": "https://1000logos.net/wp-content/uploads/2022/02/Gujarat-Titans-logo.png",
    "Lucknow Super Giants": "https://1000logos.net/wp-content/uploads/2022/02/Lucknow-Super-Giants-logo.png"
};

function getLogo(team) {
    for (let key in logos) {
        if (team.includes(key)) return logos[key];
    }
    return "https://via.placeholder.com/45";
}

async function loadMatches() {
    const res = await fetch(`https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}`);
    const data = await res.json();

    let html = "";

    data.data.forEach(match => {
        let t1 = match.teams[0];
        let t2 = match.teams[1];

        html += `
        <div class="card">
            <div class="row">
                <div class="team">
                    <img src="${getLogo(t1)}">
                    <span>${t1}</span>
                </div>

                <div class="vs">VS</div>

                <div class="team">
                    <span>${t2}</span>
                    <img src="${getLogo(t2)}">
                </div>
            </div>

            <div class="status">${match.status}</div>
        </div>
        `;
    });

    document.getElementById("matches").innerHTML = html;
}

loadMatches();
</script>

</body>
</html>
